apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: student-app-ingress
  namespace: student-app
  annotations:
    # Allow CORS from any origin at the ingress layer (belt-and-suspenders with app-level CORS)
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Content-Type, Authorization"
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  # Modern replacement for the deprecated kubernetes.io/ingress.class annotation
  ingressClassName: nginx
  rules:
    - host: student-app.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: student-app-service
                port:
                  number: 3333
