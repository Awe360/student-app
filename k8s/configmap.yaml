apiVersion: v1
kind: ConfigMap
metadata:
  name: student-app-config
  namespace: student-app
data:
  PORT: "3333"
  NODE_ENV: "production"
  # Comma-separated list of allowed frontend origins for CORS
  # Update this to match your actual frontend URL(s)
  ALLOWED_ORIGINS: "http://student-app.local,http://localhost:3000,http://localhost:5173"
